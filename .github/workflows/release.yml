name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Import code-signing certificate
        shell: pwsh
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "markora-signing-cert.pfx"
          [IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE }}")
          )
          "WINDOWS_CERTIFICATE_PATH=$certificatePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Locate SignTool
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $signtool) {
            throw "signtool.exe was not found in the Windows SDK."
          }

          "SIGNTOOL_PATH=$($signtool.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign MSI
        shell: pwsh
        run: |
          $msiFiles = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi"
          if (-not $msiFiles) {
            throw "No MSI files found to sign."
          }

          foreach ($msi in $msiFiles) {
            & "$env:SIGNTOOL_PATH" sign `
              /f "$env:WINDOWS_CERTIFICATE_PATH" `
              /p "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}" `
              /fd SHA256 `
              /tr http://timestamp.digicert.com `
              /td SHA256 `
              "$($msi.FullName)"

            if ($LASTEXITCODE -ne 0) {
              throw "signtool failed for $($msi.FullName)"
            }
          }

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: markora-windows-${{ github.ref_name }}
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
