name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Sign MSI with Azure Artifact Signing
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ vars.AZURE_CODESIGN_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_CODESIGN_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CODESIGN_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}\src-tauri\target\release\bundle\msi
          files-folder-filter: "*.msi"
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify MSI signature
        shell: pwsh
        run: |
          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          if (-not $msi) {
            throw "No MSI file found to validate."
          }

          $signature = Get-AuthenticodeSignature $msi.FullName
          $signature | Format-List Status, StatusMessage, SignerCertificate

          if ($signature.Status -ne "Valid") {
            throw "MSI signature is invalid or missing: $($signature.Status)"
          }

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: markora-windows-${{ github.ref_name }}
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: src-tauri/target/release/bundle/msi/*.msi
          fail_on_unmatched_files: true

      - name: Publish MSI to docs releases and versions manifest
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1

          if (-not $msi) {
            throw "No MSI file found to publish."
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main

          $releaseDir = Join-Path "docs/releases" $version
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $targetName = "Markora-MD_$version.msi"
          Copy-Item -LiteralPath $msi.FullName -Destination (Join-Path $releaseDir $targetName) -Force

          $manifestPath = "docs/releases.json"
          $downloadUrl = "https://kelvink96.github.io/markora/releases/$version/$targetName"

          if (Test-Path $manifestPath) {
            $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
          } else {
            $manifest = @()
          }

          $manifest = @($manifest | Where-Object { $_.version -ne $version })
          $manifest += [pscustomobject]@{
            version = $version
            tag = $tag
            filename = $targetName
            url = $downloadUrl
            publishedAt = (Get-Date).ToUniversalTime().ToString("o")
            current = $true
          }

          $manifest = $manifest |
            Sort-Object { [version]$_.version } -Descending |
            ForEach-Object -Begin { $first = $true } -Process {
              $_.current = $first
              $first = $false
              $_
            }

          $manifest | ConvertTo-Json -Depth 10 | Set-Content $manifestPath

          git add $releaseDir $manifestPath
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: publish msi for $version"
            git push origin main
          } else {
            Write-Host "No GitHub Pages download changes to commit."
          }
